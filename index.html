<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p>CALCULATOR</p>
    <div class="container">
        <div class="row1">
            <input type="text" class="text"></input>
            <input type="button" class="clear">C</input>
        </div>
        <div class="row2">
            <input type="button" class="one">1</input>
            <input type="button" class="two">2</input>
            <input type="button" class="three">3</input>
            <input type="button" class="divide">/</input>
        </div>
        <div class="row3">
            <input type="button" class="four">4</input>
            <input type="button" class="five">5</input>
            <input type="button" class="six">6</input>
            <input type="button" class="multiply">*</input>
        </div>
        <div class="row4">
            <input type="button" class="seven">7</input>
            <input type="button" class="eight">8</input>
            <input type="button" class="nine">9</input>
            <input type="button" class="minus">-</input>
        </div>
        <div class="row5">
            <input type="button" class="zero">0</input>
            <input type="button" class="dot">.</input>
            <input type="button" class="equalsto">=</input>
            <input type="button" class="plus">+</input>
        </div>
    </div>
    <script src="server.js"></script>
</body>
</html>
